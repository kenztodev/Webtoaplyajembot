name: Build Real APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
      app_url:
        description: 'URL Website'
        required: true
      theme_color:
        description: 'Warna Tema (Hex)'
        default: '#2196F3'
      chat_id:
        description: 'ID Telegram User untuk pengiriman'
        required: true
      build_type:
        description: 'Tipe Build (url/zip)'
        default: 'url'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu' # Menggunakan Zulu sebagai alternatif yang sering lebih stabil di GitHub
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: false

    - name: Prepare Project Files
      run: |
        if [ "${{ github.event.inputs.build_type }}" == "url" ]; then
          node scripts/prepare-build.js "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.app_url }}" "${{ github.event.inputs.theme_color }}"
        else
          echo "ZIP Build detected. Using project files from repository."
          # Jika ZIP build, asumsikan file sudah ada di repo atau dihandle script lain
        fi

    - name: Build with Gradle
      id: build_step
      run: |
        cd android-template
        chmod +x gradlew
        ./gradlew assembleDebug > build_log.txt 2>&1

    - name: Send APK or Error Log to Telegram
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          APK_PATH=$(ls android-template/app/build/outputs/apk/debug/*.apk | head -n 1)
          curl -F document=@"$APK_PATH" \
               -F chat_id="${{ github.event.inputs.chat_id }}" \
               -F caption="✅ <b>Build Selesai!</b>%0A%0ANama: ${{ github.event.inputs.app_name }}%0AURL: ${{ github.event.inputs.app_url }}" \
               -F parse_mode="HTML" \
               https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
        else
          # Get last 20 lines of build log for quick error view
          ERROR_LOG=$(tail -n 20 android-template/build_log.txt)
          echo "$ERROR_LOG" > error_summary.txt
          
          curl -F document=@"error_summary.txt" \
               -F chat_id="${{ github.event.inputs.chat_id }}" \
               -F caption="❌ <b>Build Gagal!</b>%0A%0ANama: ${{ github.event.inputs.app_name }}%0A%0ASilakan cek log error yang terlampir." \
               -F parse_mode="HTML" \
               https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendDocument
        fi

    - name: Notify Bot Server of Completion
      if: always()
      run: |
        # Optional: Panggil webhook bot Anda jika ingin otomatis memproses antrian berikutnya lebih cepat
        # curl -X POST -H "Content-Type: application/json" -d '{"chatId":"${{ github.event.inputs.chat_id }}", "status":"${{ job.status }}"}' ${{ github.event.inputs.callback_url }}
        echo "Build finished with status: ${{ job.status }}"
